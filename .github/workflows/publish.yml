name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check for Prerelease Version
        id: version_check
        run: |
          # Read version from package.json
          VERSION=$(node -p "require('./package.json').version")
          echo "Detected version: $VERSION"
          
          # Check if version contains a hyphen (e.g., 1.0.0-alpha.0)
          if [[ "$VERSION" == *-* ]]; then
            echo "Prerelease detected."
            echo "TAG_FLAG=--tag alpha" >> $GITHUB_ENV
          else
            echo "Stable release detected."
            echo "TAG_FLAG=" >> $GITHUB_ENV
          fi

      - name: Publish to npm
        run: npm publish --access public --provenance ${{ env.TAG_FLAG }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
